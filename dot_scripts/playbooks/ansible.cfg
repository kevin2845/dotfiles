[defaults]
# Prevent the implicit-localhost inventory warnings
localhost_warning = False
inventory_unparsed_warning = False

# Make localhost work consistently even when you don't pass -i
inventory = localhost,

[privilege_escalation]
become = True
become_method = sudo
# -n = non-interactive; if sudo ever *would* prompt, fail fast instead of hanging
become_flags = -n
become_ask_pass = False
